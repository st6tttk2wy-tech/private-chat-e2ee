<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>私密聊天</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0a0a0f;--surface:#12121a;--surface2:#1a1a25;--border:#2a2a3a;--primary:#6c5ce7;--primary-hover:#7c6cf7;--danger:#e74c3c;--text:#e0e0e0;--text2:#8888a0;--success:#2ecc71;--warn:#f39c12}
body{font-family:'Segoe UI',system-ui,-apple-system,sans-serif;background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center}
.screen{display:none;width:100%;max-width:600px;padding:20px}
.screen.active{display:flex;flex-direction:column;align-items:center}
h1{font-size:28px;margin-bottom:8px;background:linear-gradient(135deg,var(--primary),#a29bfe);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.subtitle{color:var(--text2);margin-bottom:40px;font-size:14px}
.card{background:var(--surface);border:1px solid var(--border);border-radius:16px;padding:32px;width:100%;margin-bottom:16px}
.btn{width:100%;padding:14px;border:none;border-radius:10px;font-size:15px;font-weight:600;cursor:pointer;transition:all .2s;margin-bottom:10px;color:#fff}
.btn-primary{background:var(--primary)}.btn-primary:hover{background:var(--primary-hover);transform:translateY(-1px)}
.btn-danger{background:var(--danger)}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--text)}.btn-outline:hover{border-color:var(--primary);color:var(--primary)}
.btn-sm{padding:8px 16px;width:auto;font-size:13px;border-radius:8px}
.btn-link{background:var(--success);font-size:14px;padding:12px}
.input{width:100%;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none;transition:border .2s}
.input:focus{border-color:var(--primary)}
textarea.input{resize:vertical;min-height:80px;font-family:monospace;font-size:12px}
.badge{display:inline-flex;align-items:center;gap:6px;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:500}
.badge-green{background:rgba(46,204,113,.15);color:var(--success)}
.badge-red{background:rgba(231,76,60,.15);color:var(--danger)}
.badge-yellow{background:rgba(243,156,18,.15);color:var(--warn)}
.chat-container{width:100%;max-width:600px;height:calc(100vh - 40px);display:flex;flex-direction:column}
.chat-header{padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:12px 12px 0 0;display:flex;justify-content:space-between;align-items:center}
.chat-header h2{font-size:16px}
.chat-messages{flex:1;overflow-y:auto;padding:16px 20px;display:flex;flex-direction:column;gap:12px}
.msg{max-width:75%;padding:12px 16px;border-radius:16px;font-size:14px;line-height:1.5;position:relative;animation:fadeIn .3s}
.msg-in{align-self:flex-start;background:var(--surface2);border-bottom-left-radius:4px}
.msg-out{align-self:flex-end;background:var(--primary);border-bottom-right-radius:4px}
.msg-burn{opacity:0;max-height:0;padding:0;margin:0;border:none;overflow:hidden;transition:all .5s}
.msg .time{font-size:11px;color:rgba(255,255,255,.4);margin-top:4px}
.msg-in .time{color:var(--text2)}
.msg .burn-icon{position:absolute;top:8px;right:8px;font-size:10px;opacity:.5}
.chat-input{padding:16px 20px;background:var(--surface);border:1px solid var(--border);border-radius:0 0 12px 12px;display:flex;gap:10px}
.chat-input input{flex:1;padding:12px 16px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;color:var(--text);font-size:14px;outline:none}
.chat-input input:focus{border-color:var(--primary)}
.chat-input button{padding:12px 20px;background:var(--primary);border:none;border-radius:10px;color:#fff;font-weight:600;cursor:pointer}
.step{display:flex;align-items:center;gap:12px;margin-bottom:20px;padding:16px;background:var(--surface2);border-radius:10px}
.step-num{width:32px;height:32px;border-radius:50%;background:var(--primary);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:14px;flex-shrink:0}
.step-text{font-size:14px;line-height:1.5}
.step-text strong{color:var(--primary)}
.emoji-big{font-size:48px;margin-bottom:16px}
.status-bar{display:flex;align-items:center;gap:8px;padding:8px 16px;background:var(--surface);border-radius:8px;margin-bottom:12px;font-size:13px}
@keyframes fadeIn{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.5}}
.pulsing{animation:pulse 1.5s infinite}
.copy-hint{font-size:12px;color:var(--text2);margin-top:8px}
.tab-bar{display:flex;gap:8px;margin-bottom:16px;width:100%}
.tab{flex:1;padding:12px;background:var(--surface2);border:1px solid var(--border);border-radius:10px;text-align:center;cursor:pointer;font-size:14px;transition:all .2s}
.tab.active{border-color:var(--primary);color:var(--primary);background:rgba(108,92,231,.1)}
.toast{position:fixed;top:20px;left:50%;transform:translateX(-50%);background:var(--success);color:#fff;padding:12px 24px;border-radius:10px;font-size:14px;z-index:999;animation:fadeIn .3s}
.link-box{background:#000;padding:16px;border-radius:12px;border:1px solid var(--border);margin:16px 0;word-break:break-all;font-size:13px;color:var(--success);max-height:150px;overflow-y:auto}
.divider{display:flex;align-items:center;gap:12px;margin:16px 0;color:var(--text2);font-size:13px}
.divider::before,.divider::after{content:'';flex:1;height:1px;background:var(--border)}
.btn-row{display:flex;gap:10px}.btn-row .btn{flex:1}
</style>
</head>
<body>

<div id="screen-landing" class="screen active">
  <div class="emoji-big">&#128274;</div>
  <h1>私密聊天</h1>
  <p class="subtitle">端到端加密 | 阅后即焚 | 仅邀请使用</p>
  <div class="card">
    <div class="tab-bar">
      <div class="tab active" onclick="showTab('create')">创建房间</div>
      <div class="tab" onclick="showTab('join')">加入房间</div>
    </div>
    <div id="tab-create">
      <p style="font-size:14px;color:var(--text2);margin-bottom:16px;text-align:left">创建加密聊天房间，生成链接发送给对方。</p>
      <button class="btn btn-primary" onclick="createRoom()">创建房间</button>
    </div>
    <div id="tab-join" style="display:none">
      <p style="font-size:14px;color:var(--text2);margin-bottom:16px;text-align:left">粘贴对方发来的邀请链接或邀请码。</p>
      <textarea class="input" id="joinInput" placeholder="粘贴邀请链接或邀请码..." style="min-height:80px"></textarea>
      <button class="btn btn-primary" onclick="joinRoom()" style="margin-top:10px">加入房间</button>
      <p id="joinError" style="color:var(--danger);font-size:12px;margin-top:8px;display:none"></p>
    </div>
  </div>
</div>

<div id="screen-wait" class="screen">
  <div class="emoji-big">&#128276;</div>
  <h1>等待连接</h1>
  <p class="subtitle">房间已创建，发送链接给对方即可</p>
  <div class="card">
    <div class="status-bar">
      <span class="badge badge-green pulsing">&#9679; 等待中</span>
    </div>
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">复制<strong>邀请链接</strong>发送给对方</div>
    </div>
    <div class="link-box" id="inviteLink"></div>
    <div class="btn-row">
      <button class="btn btn-link" onclick="copyInviteLink()">复制链接</button>
      <button class="btn btn-outline" onclick="showRawInvite()">显示原始码</button>
    </div>
    <div id="rawInviteSection" style="display:none;margin-top:12px">
      <textarea class="input" id="inviteCode" readonly style="min-height:80px"></textarea>
    </div>
    <div class="divider">等待对方加入</div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">对方加入后，粘贴<strong>回复码</strong>到下方</div>
    </div>
    <textarea class="input" id="remoteAnswer" placeholder="粘贴对方发来的回复码..."></textarea>
    <button class="btn btn-primary" onclick="connectAsHost()" style="margin-top:10px">建立连接</button>
    <button class="btn btn-outline btn-sm" onclick="goLanding()" style="margin-top:8px">取消</button>
  </div>
</div>

<div id="screen-join" class="screen">
  <div class="emoji-big">&#128279;</div>
  <h1>加入房间</h1>
  <p class="subtitle">正在建立安全连接...</p>
  <div class="card">
    <div class="status-bar">
      <span class="badge badge-yellow pulsing">&#9679; 连接中</span>
    </div>
    <div class="step">
      <div class="step-num">1</div>
      <div class="step-text">已解析邀请，密钥已就绪</div>
    </div>
    <div class="step">
      <div class="step-num">2</div>
      <div class="step-text">复制<strong>回复码</strong>发送给创建者</div>
    </div>
    <div class="link-box" id="replyCode"></div>
    <button class="btn btn-link" onclick="copyReplyCode()">复制回复码</button>
    <div class="divider">等待创建者确认</div>
    <div class="copy-hint" style="text-align:center">创建者确认后将自动进入聊天</div>
    <button class="btn btn-outline btn-sm" onclick="goLanding()" style="margin-top:12px">取消</button>
  </div>
</div>

<div id="screen-chat" class="screen" style="padding:0;height:100vh">
  <div class="chat-container">
    <div class="chat-header">
      <div>
        <h2>&#128274; 私密聊天</h2>
        <span class="badge badge-green" style="margin-top:4px">&#9679; 已加密连接</span>
      </div>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline btn-sm" onclick="showBurnInfo()">&#128293; 阅后即焚</button>
        <button class="btn btn-outline btn-sm" onclick="disconnectChat()">&#128682; 断开</button>
      </div>
    </div>
    <div class="chat-messages" id="chatMessages"></div>
    <div class="chat-input">
      <input type="text" id="msgInput" placeholder="输入消息（阅后即焚）..." onkeydown="if(event.key==='Enter')sendMessage()">
      <button onclick="sendMessage()">&#10148;</button>
    </div>
  </div>
</div>

<div id="toast" style="display:none"></div>

<script>
const STUN_SERVERS = {iceServers: [{urls: 'stun:stun.l.google.com:19302'}, {urls: 'stun:stun1.l.google.com:19302'}]};
let pc = null, dc = null, isHost = false, sharedSecret = null;

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

function showTab(tab) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.querySelectorAll('.tab')[tab === 'create' ? 0 : 1].classList.add('active');
  document.getElementById('tab-create').style.display = tab === 'create' ? 'block' : 'none';
  document.getElementById('tab-join').style.display = tab === 'join' ? 'block' : 'none';
}

function goLanding() { if (pc) { pc.close(); pc = null; } showScreen('landing'); }

function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.style.display = 'block';
  setTimeout(() => t.style.display = 'none', 2500);
}

function generateId(len) {
  const arr = new Uint8Array(len || 8);
  crypto.getRandomValues(arr);
  return btoa(String.fromCharCode(...arr)).replace(/[+/=]/g, c => ({'+':'-','/':'_','=':''}[c] || c)).substring(0, len || 8);
}

function compressSDP(sdp) {
  const lines = sdp.split('\r\n').filter(l => l);
  const essential = [];
  
  for (const line of lines) {
    if (line.startsWith('v=0')) {
      continue;
    } else if (line.startsWith('o=-')) {
      essential.push(line);
    } else if (line.startsWith('s=')) {
      continue;
    } else if (line.startsWith('t=0 0')) {
      continue;
    } else if (line.startsWith('m=')) {
      essential.push(line);
    } else if (line.startsWith('a=group:')) {
      essential.push(line);
    } else if (line.startsWith('a=mid:')) {
      essential.push(line);
    } else if (line.startsWith('a=ice-ufrag:')) {
      essential.push('u:' + line.substring(12));
    } else if (line.startsWith('a=ice-pwd:')) {
      essential.push('p:' + line.substring(10));
    } else if (line.startsWith('a=fingerprint:')) {
      essential.push('f:' + line.substring(14));
    } else if (line.startsWith('a=candidate:')) {
      const parts = line.substring(12).split(' ');
      if (parts[7] === 'host') {
        essential.push('c:' + parts.slice(0, 8).join(' '));
      }
    } else if (line.startsWith('a=setup:')) {
      essential.push('k:' + line.substring(8));
    } else if (line.startsWith('a=sctp-port:')) {
      essential.push('sp:' + line.substring(12));
    } else if (line.startsWith('a=max-message-size:')) {
      essential.push('ms:' + line.substring(19));
    }
  }
  return essential.join(';');
}

function decompressSDP(compressed) {
  const lines = compressed.split(';').map(l => {
    if (l.startsWith('c:')) return 'a=candidate:' + l.substring(2);
    if (l.startsWith('u:')) return 'a=ice-ufrag:' + l.substring(2);
    if (l.startsWith('p:')) return 'a=ice-pwd:' + l.substring(2);
    if (l.startsWith('f:')) return 'a=fingerprint:' + l.substring(2);
    if (l.startsWith('k:')) return 'a=setup:' + l.substring(2);
    if (l.startsWith('sp:')) return 'a=sctp-port:' + l.substring(3);
    if (l.startsWith('ms:')) return 'a=max-message-size:' + l.substring(3);
    return l;
  });
  const result = ['v=0'];
  for (const line of lines) {
    result.push(line);
    if (line.startsWith('o=')) {
      result.push('s=-', 't=0 0');
    }
  }
  return result.join('\r\n') + '\r\n';
}

function shortEncode(str) {
  return btoa(unescape(encodeURIComponent(str))).replace(/[+/=]/g, c => ({'+':'-','/':'_','=':''}[c] || c));
}

function shortDecode(str) {
  const decoded = str.replace(/[-_]/g, c => ({'-':'+','_':'/'}[c] || c));
  return decodeURIComponent(escape(atob(decoded)));
}

async function encryptAES(data, key) {
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(key), 'PBKDF2', false, ['deriveKey']);
  const derivedKey = await crypto.subtle.deriveKey(
    {name: 'PBKDF2', salt: enc.encode('pc-s'), iterations: 50000, hash: 'SHA-256'},
    keyMaterial, {name: 'AES-GCM', length: 256}, false, ['encrypt']
  );
  const iv = crypto.getRandomValues(new Uint8Array(12));
  const encrypted = await crypto.subtle.encrypt({name: 'AES-GCM', iv}, derivedKey, enc.encode(data));
  const combined = new Uint8Array(iv.length + new Uint8Array(encrypted).length);
  combined.set(iv);
  combined.set(new Uint8Array(encrypted), iv.length);
  return btoa(String.fromCharCode(...combined)).replace(/[+/=]/g, c => ({'+':'-','/':'_','=':''}[c] || c));
}

async function decryptAES(encStr, key) {
  const decoded = encStr.replace(/[-_]/g, c => ({'-':'+','_':'/'}[c] || c));
  const raw = Uint8Array.from(atob(decoded), c => c.charCodeAt(0));
  const iv = raw.slice(0, 12);
  const data = raw.slice(12);
  const enc = new TextEncoder();
  const keyMaterial = await crypto.subtle.importKey('raw', enc.encode(key), 'PBKDF2', false, ['deriveKey']);
  const derivedKey = await crypto.subtle.deriveKey(
    {name: 'PBKDF2', salt: enc.encode('pc-s'), iterations: 50000, hash: 'SHA-256'},
    keyMaterial, {name: 'AES-GCM', length: 256}, false, ['decrypt']
  );
  const decrypted = await crypto.subtle.decrypt({name: 'AES-GCM', iv}, derivedKey, data);
  return new TextDecoder().decode(decrypted);
}

function getBaseUrl() { return location.origin + location.pathname; }

async function createRoom() {
  const roomId = generateId(6);
  sharedSecret = generateId(10);
  isHost = true;

  pc = new RTCPeerConnection(STUN_SERVERS);
  dc = pc.createDataChannel('chat', {ordered: true});
  dc.onmessage = (e) => handleRemoteMessage(e.data);
  dc.onopen = () => onConnected();
  dc.onclose = () => onDisconnected();
  pc.oniceconnectionstatechange = () => {
    if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') onDisconnected();
  };

  const offer = await pc.createOffer();
  await pc.setLocalDescription(offer);
  await new Promise(resolve => {
    if (pc.iceGatheringState === 'complete') return resolve();
    pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') resolve(); };
    setTimeout(resolve, 5000);
  });

  const compressedOffer = compressSDP(pc.localDescription.sdp);
  const encryptedOffer = await encryptAES(compressedOffer, sharedSecret);
  const invitePayload = roomId + '.' + sharedSecret + '.' + encryptedOffer;

  const inviteLink = getBaseUrl() + '#i=' + invitePayload;
  document.getElementById('inviteLink').textContent = inviteLink;
  document.getElementById('inviteCode').value = invitePayload;
  showScreen('wait');
}

function copyInviteLink() {
  const link = document.getElementById('inviteLink').textContent;
  navigator.clipboard.writeText(link).then(() => showToast('链接已复制')).catch(() => {
    const t = document.getElementById('inviteLink');
    const range = document.createRange();
    range.selectNodeContents(t);
    window.getSelection().removeAllRanges();
    window.getSelection().addRange(range);
    document.execCommand('copy');
    showToast('链接已复制');
  });
}

function copyReplyCode() {
  const code = document.getElementById('replyCode').textContent;
  navigator.clipboard.writeText(code).then(() => showToast('回复码已复制')).catch(() => {
    showToast('请手动复制');
  });
}

function showRawInvite() {
  const sec = document.getElementById('rawInviteSection');
  sec.style.display = sec.style.display === 'none' ? 'block' : 'none';
}

async function joinRoom() {
  let input = document.getElementById('joinInput').value.trim();
  const errorEl = document.getElementById('joinError');
  if (errorEl) errorEl.style.display = 'none';

  if (!input) { showToast('请粘贴邀请信息'); return; }

  if (input.includes('#i=')) {
    input = input.split('#i=')[1];
  }

  const parts = input.split('.');
  if (parts.length !== 3) {
    const msg = '邀请信息格式错误，请确保复制完整链接';
    showToast(msg);
    if (errorEl) { errorEl.textContent = msg; errorEl.style.display = 'block'; }
    return;
  }

  const roomId = parts[0];
  sharedSecret = parts[1];
  const encryptedOffer = parts[2];
  isHost = false;

  console.log('Parsed invite, creating RTCPeerConnection');

  pc = new RTCPeerConnection(STUN_SERVERS);
  pc.ondatachannel = (e) => {
    console.log('Data channel received');
    dc = e.channel;
    dc.onmessage = (ev) => handleRemoteMessage(ev.data);
    dc.onopen = () => onConnected();
    dc.onclose = () => onDisconnected();
  };
  pc.oniceconnectionstatechange = () => {
    console.log('ICE state:', pc.iceConnectionState);
    if (pc.iceConnectionState === 'disconnected' || pc.iceConnectionState === 'failed') {
      const msg = '连接失败，请检查网络或重试';
      showToast(msg);
      if (errorEl) { errorEl.textContent = msg; errorEl.style.display = 'block'; }
    }
  };

  try {
    console.log('Decrypting offer...');
    const compressedSDP = await decryptAES(encryptedOffer, sharedSecret);
    const sdp = decompressSDP(compressedSDP);
    await pc.setRemoteDescription(new RTCSessionDescription({type: 'offer', sdp: sdp}));
    console.log('Remote description set');
  } catch(e) {
    console.error('Error:', e);
    const msg = '解密失败，请检查邀请码是否完整';
    showToast(msg);
    if (errorEl) { errorEl.textContent = msg; errorEl.style.display = 'block'; }
    return;
  }

  console.log('Creating answer...');
  const answer = await pc.createAnswer();
  await pc.setLocalDescription(answer);
  console.log('Waiting for ICE gathering...');
  await new Promise(resolve => {
    if (pc.iceGatheringState === 'complete') return resolve();
    pc.onicegatheringstatechange = () => { if (pc.iceGatheringState === 'complete') resolve(); };
    setTimeout(resolve, 5000);
  });

  console.log('Encrypting answer...');
  const compressedAnswer = compressSDP(pc.localDescription.sdp);
  const encryptedAnswer = await encryptAES(compressedAnswer, sharedSecret);
  const replyCode = 'r.' + encryptedAnswer;

  document.getElementById('replyCode').textContent = replyCode;
  console.log('Showing join screen');
  showScreen('join');
}

async function connectAsHost() {
  const input = document.getElementById('remoteAnswer').value.trim();
  if (!input) { showToast('请粘贴回复码'); return; }

  if (!input.startsWith('r.')) {
    showToast('回复码格式错误');
    return;
  }

  const encryptedAnswer = input.substring(2);

  try {
    const compressedSDP = await decryptAES(encryptedAnswer, sharedSecret);
    const sdp = decompressSDP(compressedSDP);
    await pc.setRemoteDescription(new RTCSessionDescription({type: 'answer', sdp: sdp}));
  } catch(e) {
    showToast('解密回复码失败');
    return;
  }
}

function onConnected() {
  showScreen('chat');
  addSystemMessage('安全连接已建立，消息端到端加密');
  addSystemMessage('阅后即焚已启用，消息阅读后自动销毁');
}

function onDisconnected() {
  addSystemMessage('连接已断开');
  showToast('对方已断开连接');
}

function addSystemMessage(text) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.style.cssText = 'text-align:center;font-size:12px;color:var(--text2);padding:8px;';
  div.textContent = text;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function getBurnDelay(text) {
  const len = text.length;
  if (len <= 10) return 3000;
  if (len <= 30) return 5000;
  if (len <= 60) return 8000;
  if (len <= 100) return 12000;
  return Math.min(20000, 3000 + len * 200);
}

function addChatMessage(text, isOutgoing) {
  const container = document.getElementById('chatMessages');
  const div = document.createElement('div');
  div.className = 'msg ' + (isOutgoing ? 'msg-out' : 'msg-in');
  const time = new Date().toLocaleTimeString('zh-CN', {hour:'2-digit', minute:'2-digit'});
  div.innerHTML = '<div class="burn-icon">&#128293;</div>' + escapeHtml(text) + '<div class="time">' + time + '</div>';
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;

  const burnDelay = getBurnDelay(text);

  if (isOutgoing) {
    setTimeout(() => {
      if (div.parentNode) {
        div.classList.add('msg-burn');
        setTimeout(() => div.remove(), 600);
      }
    }, burnDelay);
  } else {
    pendingBurns.push({
      element: div,
      burnDelay: burnDelay,
      burnTimer: null,
      viewed: false
    });
    checkAndBurn();
  }
}

let pendingBurns = [];

function checkAndBurn() {
  const isPageVisible = document.visibilityState === 'visible';

  pendingBurns = pendingBurns.filter(item => {
    if (!item.element || !item.element.parentNode || item.element.classList.contains('msg-burn')) {
      return false;
    }

    const isVisible = isPageVisible && isElementInViewport(item.element);

    if (isVisible && !item.viewed) {
      item.viewed = true;
      item.viewStartTime = Date.now();
    }

    if (item.viewed) {
      const elapsed = Date.now() - item.viewStartTime;
      if (elapsed >= item.burnDelay) {
        item.element.classList.add('msg-burn');
        setTimeout(() => item.element.remove(), 600);
        return false;
      }
    }

    return true;
  });
}

function isElementInViewport(el) {
  const rect = el.getBoundingClientRect();
  return (
    rect.top >= 0 && rect.left >= 0 &&
    rect.bottom <= (window.innerHeight || document.documentElement.clientHeight) &&
    rect.right <= (window.innerWidth || document.documentElement.clientWidth)
  );
}

document.addEventListener('visibilitychange', checkAndBurn);
window.addEventListener('focus', checkAndBurn);
window.addEventListener('scroll', checkAndBurn);

setInterval(checkAndBurn, 500);

function escapeHtml(text) { const d = document.createElement('div'); d.textContent = text; return d.innerHTML; }

async function sendMessage() {
  const input = document.getElementById('msgInput');
  const text = input.value.trim();
  if (!text || !dc || dc.readyState !== 'open') return;
  try {
    const encrypted = await encryptAES(text, sharedSecret);
    dc.send(encrypted);
    addChatMessage(text, true);
    input.value = '';
  } catch(e) { showToast('发送失败'); }
}

async function handleRemoteMessage(rawData) {
  try {
    const decrypted = await decryptAES(rawData, sharedSecret);
    addChatMessage(decrypted, false);
  } catch(e) { addSystemMessage('收到无法解密的消息'); }
}

function disconnectChat() {
  if (dc) dc.close();
  if (pc) pc.close();
  pc = null; dc = null; sharedSecret = null;
  showScreen('landing');
  showToast('已断开连接');
}

function showBurnInfo() { showToast('阅后即焚：消息阅读后自动销毁'); }

window.addEventListener('load', () => {
  const hash = location.hash;
  if (hash.startsWith('#i=')) {
    const inviteData = hash.substring(3);
    if (inviteData.length > 10) {
      document.getElementById('joinInput').value = inviteData;
      showTab('join');
      setTimeout(() => {
        joinRoom();
      }, 500);
    } else {
      showToast('邀请链接无效，请手动输入邀请码');
    }
  }
});

window.addEventListener('beforeunload', () => {
  if (dc) dc.close();
  if (pc) pc.close();
});
</script>
